# Production: run after pulling images from GHCR.
# On VPS: copy .env, then: docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d
# Set GITHUB_OWNER in .env (e.g. your GitHub username or org) so image names resolve.

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: tickets
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/${GITHUB_OWNER}/ticket-saas-backend:latest
    restart: always
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/tickets?schema=public
    depends_on:
      db: { condition: service_healthy }

  web:
    image: ghcr.io/${GITHUB_OWNER}/ticket-saas-web:latest
    restart: always
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/tickets?schema=public
      TICKET_BACKEND_URL: http://backend:3000
    depends_on:
      - backend

volumes:
  postgres_data: