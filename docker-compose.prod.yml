# Production: Next.js monolith only. Run after pulling image from GHCR.
# On VPS: create /srv/lizard/uploads, set ownership (see DEPLOY.md), copy .env, then docker compose up.
# Set GITHUB_OWNER in .env (e.g. your GitHub username or org).
# Uploads: host bind mount so files persist outside the container; nginx serves /uploads/ directly from host.

services:
  db:
    image: postgres:15-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Tk7mN2xQ4wR9pL5}
      POSTGRES_DB: tickets
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/${GITHUB_OWNER}/ticket-saas-web:latest
    restart: always
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-Tk7mN2xQ4wR9pL5}@db:5432/tickets?schema=public
    volumes:
      - /srv/lizard/uploads:/app/public/uploads
    depends_on:
      db: { condition: service_healthy }

volumes:
  postgres_data:
